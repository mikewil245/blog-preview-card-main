<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <div class="blog-container">
      <div class="blog-img">
        <img src="assets/images/illustration-article.svg" alt="blog-img" />
      </div>
      <div class="blog-content">
        <div class="first-blog-section first-blog-styling">
          <h3>Learning</h3>
          <span>Published 21 Dec 2023</span>
        </div>
        <div class="main-blog-content">
          <h2 class="hover-me">HTML & CSS foundations</h2>
          <p>
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
      </div>
      <footer>
        <div class="profile-picture">
          <img src="assets/images/image-avatar.webp" alt="person" />
          <div class="profile-name">
            <div>Greg</div>
            <div>Hooper</div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
